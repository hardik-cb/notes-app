<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uni-Note (Console Layout)</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Login Modal Overlay -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Welcome to Uni-Note</h2>
      <p>Log in or Create an Account</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="login-btn">Enter Workspace</button>
      </form>
      <div id="login-error" class="error-msg"></div>
    </div>
  </div>

  <!-- New Tab Modal Overlay -->
  <div id="new-tab-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Name your Tab</h2>
      <p>Give your new document a recognizable name.</p>
      <form id="new-tab-form">
        <input type="text" id="new-tab-name" placeholder="e.g. Brainstorming, Project Notes..." required>
        <div class="modal-actions-v">
          <button type="submit" class="primary-btn">Create New Tab</button>
          <button type="button" id="just-create-tab-btn" class="secondary-btn">Just create</button>
          <button type="button" id="cancel-tab-btn" class="ghost-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal Overlay -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Delete Tab?</h2>
      <p>Are you sure you want to delete <strong id="delete-tab-name-label"></strong>? This action cannot be undone.</p>
      <div class="modal-actions" style="display: flex; gap: 8px; flex-direction: column;">
        <button id="confirm-delete-btn" class="primary-btn" style="background-color: #ef4444;">Delete
          permanently</button>
        <button id="cancel-delete-btn" class="ghost-btn">Keep tab</button>
      </div>
    </div>
  </div>

  <!-- Image Alignment Tooltip (Hidden by default) -->
  <div id="image-align-tooltip" class="floating-tooltip hidden">
    <button data-align="left" title="Align Left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="17" y1="10" x2="3" y2="10"></line>
        <line x1="21" y1="6" x2="3" y2="6"></line>
        <line x1="21" y1="14" x2="3" y2="14"></line>
        <line x1="17" y1="18" x2="3" y2="18"></line>
      </svg>
    </button>
    <button data-align="center" title="Align Center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="10" x2="6" y2="10"></line>
        <line x1="21" y1="6" x2="3" y2="6"></line>
        <line x1="21" y1="14" x2="3" y2="14"></line>
        <line x1="18" y1="18" x2="6" y2="18"></line>
      </svg>
    </button>
    <button data-align="right" title="Align Right">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="21" y1="10" x2="7" y2="10"></line>
        <line x1="21" y1="6" x2="3" y2="6"></line>
        <line x1="21" y1="14" x2="3" y2="14"></line>
        <line x1="21" y1="18" x2="7" y2="18"></line>
      </svg>
    </button>
    <div class="nav-divider" style="height: 12px; margin: 0 4px;"></div>
    <button data-align="wrap-left" title="Wrap Text Left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 6H13"></path>
        <path d="M21 10H13"></path>
        <path d="M21 14H13"></path>
        <path d="M21 18H13"></path>
        <rect x="3" y="6" width="7" height="10"></rect>
      </svg>
    </button>
    <button data-align="wrap-right" title="Wrap Text Right">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 6H3"></path>
        <path d="M11 10H3"></path>
        <path d="M11 14H3"></path>
        <path d="M11 18H3"></path>
        <rect x="14" y="6" width="7" height="10"></rect>
      </svg>
    </button>
    <div class="nav-divider" style="height: 12px; margin: 0 4px;"></div>
    <button data-align="delete" title="Delete Image" class="delete-img-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
      </svg>
    </button>
  </div>

  <!-- Profile Modal Overlay -->
  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content profile-content">
      <div class="profile-header">
        <h2>Your Profile</h2>
        <button id="close-profile-btn" class="icon-btn close-modal-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="profile-image-container">
        <div id="profile-preview" class="profile-preview-large">U</div>
      </div>
      <div class="profile-actions">
        <button id="upload-image-btn" class="primary-btn">Upload</button>
        <button id="clear-image-btn" class="ghost-btn danger-ghost">Clear</button>
      </div>
      <input type="file" id="profile-file-input" class="hidden" accept="image/*">
    </div>
  </div>

  <!-- App Container (Top Navbar + Main Body) -->
  <div id="app-container" class="layout-column hidden">

    <!-- Top Dark Navbar -->
    <nav class="top-navbar">
      <div class="nav-left">
        <div class="logo">
          <div class="avatar" id="user-initial">U</div>
          <div class="nav-divider"></div>
        </div>
        <span id="workspace-title" class="nav-workspace-title"><span class="user-id"
            id="nav-username">Personal</span>'s<br>Workspace</span>
        <div class="status-badges">
          <span class="badge dark-badge" id="sync-dot-container">
            <span class="pulse-dot" id="sync-dot"></span>
            <span id="sync-text">Ready</span>
            <button id="manual-save-btn" class="mini-save-btn hidden">Save Now</button>
          </span>
        </div>
      </div>

      <div class="nav-right">
        <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
          <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="feather feather-sun">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button id="logout-btn" class="icon-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </nav>

    <!-- Main Content App Area -->
    <main class="main-content">

      <!-- Tab Layout -->
      <div class="tabs-container">
        <div class="tab-list" id="tab-group">

          <!-- Dynamically populated via app.js -->
        </div>
        <button class="add-tab-btn" id="add-tab-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <!-- Editor Container Data Card -->
      <div class="card-container">
        <div class="editor-card">
          <div id="editor-canvas" class="canvas" contenteditable="true"
            placeholder="Start typing... Or switch to a new tab above."></div>
        </div>
      </div>

    </main>

  </div>

  <script src="app.js"></script>
</body>

</html>
